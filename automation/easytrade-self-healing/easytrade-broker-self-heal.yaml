# NOTE: This is a workflow design document showing the intended automation logic.
# To deploy, create the actual workflow in Dynatrace UI (Automation > Workflows)
# or export/import via the Dynatrace Workflow API. Action types below map to
# AutomationEngine actions (e.g., Run JavaScript, HTTP Request, K8s actions).
# See: https://docs.dynatrace.com/docs/platform/automationengine

# EasyTrade Broker Self-Healing Workflow
# Deploy with: dtctl apply -f easytrade-broker-self-heal.yaml --write-id
# This provides automated self-healing for the EasyTrade broker microservice.
# Triggered by Dynatrace Davis problems (high error rate, latency, or crashes in broker).
# Remediation: Restart the broker deployment in the kind cluster via documented K8s action.
# Ties directly to the DynaKube-monitored EasyTrade app (19 services).

title: "EasyTrade - Broker Self-Healing"
description: "Self-healing automation for the EasyTrade broker service. On Davis-detected problems (e.g. high error rate from loadgen or problem-operator), automatically remediate by restarting the deployment and notifying. Part of the Dynatrace portfolio demo for auto-remediation on microservices."

trigger:
  type: on-problem
  # Filters for EasyTrade broker-specific issues
  filter:
    entity:
      - "easytrade-broker"
    problemTitle:
      - contains: "EasyTrade"
      - contains: "broker"
    or:
      - metric: "builtin:service.errors.total"
        threshold: 5  # errors per min
  # Alternative: Use DQL schedule for proactive checks
  # schedule: "*/5 * * * *"

actions:
  - name: "Add problem comment with remediation plan"
    type: "add-comment"
    input:
      comment: |
        [AUTO-REMEDIATION] EasyTrade Broker issue detected.
        Triggered self-healing: Will restart deployment/broker in easytrade ns.
        Cluster: kind-dt-homelab
        Monitored via DynaKube applicationMonitoring.

  - name: "Execute broker deployment restart (self-heal)"
    type: "kubernetes-restart-deployment"  # DT-supported K8s action via ActiveGate/DynaKube
    # If exact action type differs, fallback to HTTP or exec
    input:
      namespace: "easytrade"
      deployment: "broker"
      # This leverages the DynaKube + ActiveGate for safe K8s control in the portfolio lab
    onFailure:
      - name: "Fallback: Log manual command"
        type: "add-comment"
        input:
          comment: "Fallback: Run manually: kubectl rollout restart deployment/broker -n easytrade --context kind-dt-homelab"

  - name: "Notify on self-healing action"
    type: "notification"
    input:
      # Placeholder for email/Slack/webhook - configure in DT UI for your channel
      message: "EasyTrade Broker self-healed. Deployment restarted. Check traces in Dynatrace."

  - name: "Verify post-remediation health (SLO check)"
    type: "exec-slo"
    input:
      sloId: "{{ easytrade-broker-availability }}"  # Links to the SLO defined in dynatrace/slos/

# Usage in portfolio:
# 1. dtctl apply -f this-file.yaml --write-id
# 2. dtctl exec workflow <generated-id> to test manually
# 3. Problems from EasyTrade's problem-operator will auto-trigger.
# This demonstrates full self-healing loop for the microservices portfolio.
