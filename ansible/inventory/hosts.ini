# Example inventory for Dynatrace Ansible playbooks
# Customize for your environment (homelab, prod, etc.)

[linux_hosts]
# Add hosts that should receive OneAgent
# homelab-host ansible_host=YOUR_WSL_IP ansible_user=tim ansible_port=22

[activegates]
# Hosts for ActiveGate (can overlap or be separate)
# ag-homelab ansible_host=172.30.209.211

[all:vars]
# Default vars - override on command line or in group_vars
dynatrace_tenant_url=https://YOUR_TENANT_ID.live.dynatrace.com
# dynatrace_paas_token=dt0c01... (use Ansible Vault in production)